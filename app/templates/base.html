<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        var theme = localStorage.getItem('ledger-theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', theme);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Finance Dashboard{% endblock %}</title>

    <!-- Geist font (shadcn/ui default) -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS (shadcn-style overrides, loaded after Bootstrap so variables win) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">Ledger</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-2 d-lg-none">
                    <li class="nav-item d-flex align-items-center">
                        <button id="theme-toggle-mobile" class="btn btn-sm btn-outline-secondary border-0 px-2"
                                title="Toggle dark mode" aria-label="Toggle dark mode">
                            <svg id="theme-icon-mobile" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                 fill="currentColor" viewBox="0 0 16 16"></svg>
                        </button>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    {% set current = request.endpoint %}
                    <li class="nav-item">
                        <a class="nav-link {% if current == 'main.index' %}active{% endif %}"
                           href="{{ url_for('main.index') }}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if current in ['main.accounts', 'main.account_new', 'main.account_edit'] %}active{% endif %}"
                           href="{{ url_for('main.accounts') }}">Accounts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if current in ['main.monthly_update', 'main.month_detail'] %}active{% endif %}"
                           href="{{ url_for('main.monthly_update') }}">Monthly Update</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if current == 'main.projections' %}active{% endif %}"
                           href="{{ url_for('main.projections') }}">Projections</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if current == 'main.allocation' %}active{% endif %}"
                           href="{{ url_for('main.allocation') }}">Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if current == 'main.settings_page' %}active{% endif %}"
                           href="{{ url_for('main.settings_page') }}">Settings</a>
                    </li>
                </ul>
                <div class="d-none d-lg-flex align-items-center ms-auto">
                    <button id="theme-toggle" class="btn btn-sm btn-outline-secondary border-0 px-2"
                            title="Toggle dark mode" aria-label="Toggle dark mode">
                        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                             fill="currentColor" viewBox="0 0 16 16"></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Shared confirm modal (replaces native confirm() on all destructive actions) -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="confirmModalLabel">Confirm</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="confirmModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmModalOk">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Plotly for charts -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <!-- Shared JS utilities -->
    <script>
    // showConfirmModal(title, body, onConfirm, btnLabel, btnClass)
    // Drop-in replacement for native confirm() on destructive actions.
    function showConfirmModal(title, body, onConfirm, btnLabel, btnClass) {
        btnLabel = btnLabel || 'Delete';
        btnClass = btnClass || 'btn-danger';
        document.getElementById('confirmModalLabel').textContent = title;
        document.getElementById('confirmModalBody').textContent = body;
        var okBtn = document.getElementById('confirmModalOk');
        okBtn.textContent = btnLabel;
        okBtn.className = 'btn ' + btnClass;
        var modal = new bootstrap.Modal(document.getElementById('confirmModal'));
        var handler = function() {
            okBtn.removeEventListener('click', handler);
            modal.hide();
            onConfirm();
        };
        okBtn.addEventListener('click', handler);
        // Clean up handler if modal is dismissed without confirming
        document.getElementById('confirmModal').addEventListener('hidden.bs.modal', function cleanup() {
            okBtn.removeEventListener('click', handler);
            document.getElementById('confirmModal').removeEventListener('hidden.bs.modal', cleanup);
        });
        modal.show();
    }

    function shortCurrency(v) {
        if (v == null || isNaN(v)) return '—';
        if (Math.abs(v) >= 1e9) return '$' + (v / 1e9).toFixed(2) + 'B';
        if (Math.abs(v) >= 1e6) return '$' + (v / 1e6).toFixed(2) + 'M';
        if (Math.abs(v) >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
        return '$' + v.toFixed(0);
    }

    // ── Client-side sortable tables ──────────────────────────────────────────
    // Add data-sort-type="text|number" to <th> elements, then call
    // initSortableTable('tableId') to enable click-to-sort on those columns.
    // Rows with class "sort-skip" are excluded from sorting.
    function _sortTableByCol(table, colIdx, dir, type) {
        const tbody = table.querySelector('tbody');
        if (!tbody) return;
        const rows = Array.from(tbody.querySelectorAll('tr')).filter(r =>
            !r.classList.contains('sort-skip') && r.querySelectorAll('td').length > colIdx);
        rows.sort((a, b) => {
            const getVal = row => {
                const cell = row.querySelectorAll('td')[colIdx];
                if (!cell) return '';
                if (cell.dataset.sortValue !== undefined) return cell.dataset.sortValue;
                return cell.textContent.trim();
            };
            const av = getVal(a), bv = getVal(b);
            if (type === 'number') {
                const an = parseFloat(av.replace(/[$%+,\s]/g, '')) || 0;
                const bn = parseFloat(bv.replace(/[$%+,\s]/g, '')) || 0;
                return (an - bn) * dir;
            }
            return av.localeCompare(bv) * dir;
        });
        rows.forEach(r => tbody.appendChild(r));
    }
    function initSortableTable(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const ths = Array.from(table.querySelectorAll('thead th'));
        let sortColIdx = -1, sortDir = 1;
        ths.forEach(th => {
            if (!th.dataset.sortType) return;
            const colIdx = ths.indexOf(th);
            th.style.cursor = 'pointer';
            th.style.userSelect = 'none';
            if (!th.querySelector('.sort-ind')) {
                th.insertAdjacentHTML('beforeend', '<span class="sort-ind ms-1 text-muted" style="font-size:.8em"></span>');
            }
            th.addEventListener('click', () => {
                if (sortColIdx === colIdx) {
                    sortDir = -sortDir;
                } else {
                    sortColIdx = colIdx;
                    sortDir = 1;
                }
                _sortTableByCol(table, colIdx, sortDir, th.dataset.sortType);
                ths.forEach(h => {
                    const ind = h.querySelector('.sort-ind');
                    if (!ind) return;
                    ind.textContent = ths.indexOf(h) === colIdx ? (sortDir === 1 ? '↑' : '↓') : '';
                });
            });
        });
    }

    // Currency input auto-format on blur.
    // Add class="currency-input" to any text input to enable.
    // Value is stored as a plain number string on submit ($ and , stripped).
    function parseCurrencyInput(el) {
        return parseFloat(el.value.replace(/[$,]/g, ''));
    }
    function formatCurrencyInput(el) {
        const v = parseCurrencyInput(el);
        if (!isNaN(v)) {
            el.value = '$' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    }
    function stripCurrencyInput(el) {
        const v = parseCurrencyInput(el);
        el.value = isNaN(v) ? '' : String(v);
    }
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.currency-input').forEach(function (el) {
            el.addEventListener('blur', function () { formatCurrencyInput(this); });
            el.closest('form')?.addEventListener('submit', function () { stripCurrencyInput(el); });
        });
    });
    </script>

    {% block extra_js %}{% endblock %}
    <script>
    (function() {
      var SUN = '<path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>';
      var MOON = '<path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"/>';

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-bs-theme', theme);
        var icon = document.getElementById('theme-icon');
        var iconMobile = document.getElementById('theme-icon-mobile');
        var svg = theme === 'dark' ? SUN : MOON;
        if (icon) icon.innerHTML = svg;
        if (iconMobile) iconMobile.innerHTML = svg;
      }

      function toggleTheme() {
        var current = document.documentElement.getAttribute('data-bs-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('ledger-theme', next);
        applyTheme(next);
      }

      document.addEventListener('DOMContentLoaded', function() {
        var current = document.documentElement.getAttribute('data-bs-theme') || 'light';
        applyTheme(current);
        var btn = document.getElementById('theme-toggle');
        var btnMobile = document.getElementById('theme-toggle-mobile');
        if (btn) btn.addEventListener('click', toggleTheme);
        if (btnMobile) btnMobile.addEventListener('click', toggleTheme);
      });
    })();
    </script>
</body>
</html>
